name: Refresh one-month earnings data
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD). Leave blank for today."
        required: false
        type: string
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch 31 days from Nasdaq
        run: node scripts/fetch-nasdaq.mjs
        env:
          START_DATE: ${{ inputs.start_date }}
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/us-earnings.json
          git diff --cached --quiet || git commit -m "Refresh Nasdaq earnings data"
          git push